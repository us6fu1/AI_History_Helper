name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Test_generator\requirements.txt pyinstaller

      - name: Build EXE
        shell: pwsh
        working-directory: Test_generator
        run: pyinstaller --noconfirm "ИИ-помощник учителя.spec"

      - name: Verify llama.cpp DLLs
        shell: pwsh
        run: |
          $libDir = "Test_generator\dist\ИИ-помощник учителя\_internal\llama_cpp\lib"
          if (!(Test-Path (Join-Path $libDir "llama.dll"))) {
            Write-Error "Missing llama.cpp runtime DLLs in $libDir"
          }

      - name: Prepare portable model folder
        shell: pwsh
        run: |
          $appDir = "Test_generator\dist\ИИ-помощник учителя"
          $modelsDir = Join-Path $appDir "models"
          New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null
          @(
            "Положите GGUF-модель в эту папку."
            ""
            "Приложение само найдет файл .gguf и загрузит нейросеть при следующем запуске."
            "Если моделей несколько, в настройках приложения можно выбрать нужный файл вручную."
          ) | Set-Content -LiteralPath (Join-Path $modelsDir "ПОЛОЖИТЬ-МОДЕЛЬ-СЮДА.txt") -Encoding UTF8

      - name: Pack ZIP
        shell: pwsh
        run: Compress-Archive -Path "Test_generator\dist\ИИ-помощник учителя" -DestinationPath "СКАЧАТЬ-ГОТОВОЕ-ПРИЛОЖЕНИЕ-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: СКАЧАТЬ-ГОТОВОЕ-ПРИЛОЖЕНИЕ-windows
          path: СКАЧАТЬ-ГОТОВОЕ-ПРИЛОЖЕНИЕ-windows.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Скачайте файл **СКАЧАТЬ-ГОТОВОЕ-ПРИЛОЖЕНИЕ-windows.zip** из раздела Assets.

            Не скачивайте `Source code (zip)` и не запускайте `install.bat`: это исходный код для разработки.

            Как запустить:
            1. Распакуйте ZIP в любую папку.
            2. Откройте папку `ИИ-помощник учителя`.
            3. Положите скачанную GGUF-модель в папку `models`.
            4. Запустите `ИИ-помощник учителя.exe`.

            Python и библиотеки устанавливать не нужно. При повторном запуске приложение само найдет модель в папке `models` и загрузит нейросеть.
          files: СКАЧАТЬ-ГОТОВОЕ-ПРИЛОЖЕНИЕ-windows.zip
