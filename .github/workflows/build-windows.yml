name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Test_generator\requirements.txt pyinstaller

      - name: Build EXE
        shell: pwsh
        working-directory: Test_generator
        run: pyinstaller --noconfirm "ИИ-помощник учителя.spec"

      - name: Pack ZIP
        shell: pwsh
        run: Compress-Archive -Path "Test_generator\dist\ИИ-помощник учителя" -DestinationPath "ИИ-помощник учителя-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ИИ-помощник учителя-windows
          path: ИИ-помощник учителя-windows.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ИИ-помощник учителя-windows.zip
